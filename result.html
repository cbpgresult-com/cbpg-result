<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CBPG Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);

min-height:100vh;

padding:20px;

}

.result-box{

max-width:1200px;

margin:auto;

background:#fff;

border-radius:20px;

padding:20px;

box-shadow:0 20px 60px rgba(0,0,0,.25);

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.back{

background:#2563eb;

color:#fff;

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-size:15px;

}

.success{

font-size:28px;

font-weight:700;

color:#16a34a;

margin-top:10px;

text-align:center;

}

.student{

font-size:22px;

font-weight:600;

text-align:center;

margin-top:10px;

}

.roll{

text-align:center;

margin-top:8px;

font-size:16px;

}

.sem{

text-align:center;

margin-top:5px;

margin-bottom:20px;

color:#555;

}

iframe{

width:100%;

height:75vh;

border:none;

border-radius:12px;

background:#eee;

}

.download{

margin-top:20px;

width:100%;

padding:15px;

font-size:17px;

border:none;

border-radius:12px;

background:#16a34a;

color:#fff;

cursor:pointer;

}

.loading{

text-align:center;

padding:100px;

font-size:20px;

font-weight:600;

}

</style>

</head>

<body>

<div class="result-box">

<div class="top">

<button class="back"
onclick="history.back()">

← Back

</button>

</div>

<div class="success">

✓ RESULT FOUND

</div>

<div
class="student"
id="studentName">

Loading...

</div>

<div
class="roll"
id="rollNo">

</div>

<div
class="sem"
id="semester">

</div>

<iframe
id="pdfFrame">

</iframe>

<button
class="download"
id="downloadBtn">

Download Result

</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxE2TMnA4lpP_WgPa3_uf7wMXKIxFEkJof0tLUVUuIGUI7oVA6bn6QxQ1mZg3Ys2Oqu/exec";
  const params = new URLSearchParams(location.search);

const roll = params.get("roll");
const year = params.get("year");
const examType = params.get("examType");
const course = params.get("course");
const sem = params.get("sem");
const father = params.get("father");

fetch(
API_URL +
"?year=" + encodeURIComponent(year) +
"&roll=" + encodeURIComponent(roll) +
"&examType=" + encodeURIComponent(examType) +
"&course=" + encodeURIComponent(course) +
"&sem=" + encodeURIComponent(sem) +
"&father=" + encodeURIComponent(father)
)
.then(r=>r.json())
.then(data=>{

if(data.status!="found"){

document.querySelector(".success").innerHTML="❌ RESULT NOT FOUND";

return;

}

document.getElementById("studentName").innerHTML="👨‍🎓 "+data.student;

document.getElementById("rollNo").innerHTML="Roll No : "+roll;

document.getElementById("semester").innerHTML="Semester : "+sem+" ("+year+")";

document.getElementById("pdfFrame").src=data.link;

document.getElementById("downloadBtn").onclick=function(){

window.open(data.link,"_blank");

};

});

</script>

</body>
</html>
